<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; font-family: 'Figtree', system-ui, sans-serif; background: #ECE6D5; min-height: 100dvh; overscroll-behavior: none; }
  * { box-sizing: border-box; }
  /* Page bg adapts to theme via class */
  body.theme-dark { background: #0a0c0b; }
  /* Hide phone scrollbars */
  .sw-scroll::-webkit-scrollbar { display: none; }
  .sw-scroll { scrollbar-width: none; }
  /* Press feedback */
  .sw-press { transition: transform 100ms ease, background-color 120ms ease, opacity 120ms ease; -webkit-tap-highlight-color: transparent; }
  .sw-press:active { transform: scale(0.97); opacity: 0.85; }
  /* Subtle bar fill animation */
  @keyframes sw-fill { from { width: 0; } }
  .sw-fill { animation: sw-fill 600ms cubic-bezier(.2,.7,.3,1); }
  /* Number count-up by transition */
  .sw-count { transition: opacity 200ms ease; }
  /* Screen transition: slide + fade */
  .sw-screen { will-change: transform, opacity; }
  @keyframes sw-slide-in  { from { transform: translateX(28px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes sw-slide-out { from { transform: none; opacity: 1; } to { transform: translateX(-12px); opacity: 0; } }
  @keyframes sw-fade-up   { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }
  /* Sheet from bottom */
  @keyframes sw-sheet-in  { from { transform: translateY(100%); } to { transform: none; } }
  @keyframes sw-sheet-bg  { from { opacity: 0; } to { opacity: 1; } }
</style>
